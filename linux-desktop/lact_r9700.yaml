# LACT config for AMD Radeon AI PRO R9700 — AI inference / daily driver tuning
#
# Place at: /etc/lact/config.yaml
# After editing: sudo systemctl restart lactd
#
# Find your GPU ID:  lact-cli list-gpus
# Replace GPU_ID_HERE with the output (e.g. 0000:09:00.0)
#
# Prerequisites (required for voltage/clock control):
#   Add to kernel parameters → amdgpu.ppfeaturemask=0xffffffff
#   CachyOS/Arch: edit /etc/default/grub or use systemd-boot entry,
#   then: sudo grub-mkconfig -o /boot/grub/grub.cfg  (or update boot entry)
#   Reboot once before applying this config.
#
# Tuning rationale:
#   voltage_offset: -80mV  — conservative, proven on R9700 Linux; reduces heat
#                             without touching max clock. Start here, go lower
#                             (-100 to -120mV) only after stability testing.
#   power_cap: 210W         — stock TDP is ~260W; 210W is enough for sustained
#                             inference (token gen is memory-bandwidth bound, not
#                             compute bound). Reduces fan noise significantly.
#   fan curve (junction)    — junction = hotspot temp, more conservative than
#                             edge. Max 40% fan at 90°C keeps the card quiet
#                             while still protecting it.
#
# For gaming / max perf: raise power_cap to stock (~260.0), voltage_offset to
# -100 to -150mV (test stability), remove max_core_clock limit.

daemon:
  log_level: info
  admin_group: wheel

apply_settings_timer: 5

gpus:
  GPU_ID_HERE:
    fan_control_enabled: true
    fan_control_settings:
      mode: curve
      temperature_key: junction
      interval_ms: 500
      # RDNA3+ requires exactly 5 curve entries.
      # Keys = junction temp (°C), values = fan speed (0.0–1.0).
      curve:
        35: 0.25
        50: 0.25
        65: 0.30
        75: 0.30
        90: 0.40
      spindown_delay_ms: 0
      change_threshold: 2
    clocks_configuration:
      voltage_offset: -80
    power_cap: 210.0
    performance_level: manual
