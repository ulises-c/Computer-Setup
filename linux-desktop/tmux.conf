# ── General ───────────────────────────────────────────────────────────────────
# Prefix left at the default C-b.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -s escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Key bindings ──────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Copy mode (vi) ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1e2030,fg=#c8d3f5"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[bold]  #H  #[nobold]"
set -g status-right "#[fg=#82aaff]%Y-%m-%d  #[fg=#c8d3f5]%H:%M"
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#82aaff,fg=#1e2030] #I:#W "
