name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
          ignore_paths: macOS

  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          failed=0
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            if ! jq empty "$f" 2>/dev/null; then
              echo "❌ Invalid JSON: $f"
              failed=1
            else
              echo "✓ $f"
            fi
          done
          exit $failed
