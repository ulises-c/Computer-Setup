services:
  # Tailscale sidecar — joins the tailnet as `uptime-kuma`, terminating HTTPS for
  # https://uptime-kuma.<tailnet>.ts.net. See ../HTTPS.md for the full pattern.
  uptime-kuma-ts:
    image: tailscale/tailscale:latest
    container_name: uptime-kuma-ts
    hostname: uptime-kuma
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    # Share the sidecar's network namespace: tailscale serve proxies :443 to
    # 127.0.0.1:3001. Outbound monitor checks still work (kernel-mode netns).
    network_mode: service:uptime-kuma-ts
    depends_on:
      - uptime-kuma-ts
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./data:/app/data
