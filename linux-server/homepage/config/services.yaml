- Services:
    - homepage:
        icon: mdi-view-dashboard
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:3000
        description: Server dashboard
        server: my-docker
        container: homepage
    - portainer:
        icon: si-portainer
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:9000
        description: Docker manager
        server: my-docker
        container: portainer
    - filebrowser:
        icon: mdi-folder-network
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:8080
        description: Web file manager
        server: my-docker
        container: filebrowser
    - cockpit:
        icon: mdi-monitor-dashboard
        href: https://{{HOMEPAGE_VAR_SERVER_IP}}:9090
        description: Server admin UI
        ping: https://localhost:9090
    - atvloadly:
        icon: mdi-television-play
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:5533
        description: Apple TV IPA sideloader
        server: my-docker
        container: atvloadly
    - adguard home:
        icon: si-adguard
        href: http://{{HOMEPAGE_VAR_SERVER_IP}}:8083
        description: DNS ad blocker
        server: my-docker
        container: adguardhome
        widget:
          type: adguardhome
          url: http://localhost:8083
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - tailscale:
        icon: si-tailscale
        href: http://{{HOMEPAGE_VAR_TAILSCALE_IP}}:5252
        description: Zero-config VPN
        ping: http://localhost:8088
