- Management:
    - homepage:
        icon: mdi-view-dashboard
        href: https://{{HOMEPAGE_VAR_HOMEPAGE_DOMAIN}}/
        description: Server dashboard
        server: my-docker
        container: homepage
    - portainer:
        icon: si-portainer
        href: https://{{HOMEPAGE_VAR_PORTAINER_DOMAIN}}/
        description: Docker manager
        server: my-docker
        container: portainer
    - watchtower:
        icon: mdi-autorenew
        description: Automatic container updates
        server: my-docker
        container: watchtower
    - cockpit:
        icon: mdi-monitor-dashboard
        href: https://{{HOMEPAGE_VAR_COCKPIT_DOMAIN}}/
        description: Server admin UI
        # cockpit stays a host service on :9090, so the local ping still works
        ping: https://localhost:9090
    - uptime kuma:
        icon: si-uptimekuma
        href: https://{{HOMEPAGE_VAR_UPTIMEKUMA_DOMAIN}}/
        description: Uptime monitor
        server: my-docker
        container: uptime-kuma
        widget:
          type: uptimekuma
          url: https://{{HOMEPAGE_VAR_UPTIMEKUMA_DOMAIN}}
          slug: default
    - glances:
        icon: si-glances
        href: https://{{HOMEPAGE_VAR_GLANCES_DOMAIN}}/
        description: System monitor
        server: my-docker
        container: glances
        widget:
          type: glances
          # glances keeps network_mode: host, so :61208 stays on the host and the
          # widget reaches it via localhost (no need to route through the tailnet).
          url: http://localhost:61208
          version: 4
          metric: cpu

- Network:
    - nginx proxy manager:
        icon: si-nginxproxymanager
        href: https://{{HOMEPAGE_VAR_NPM_DOMAIN}}/
        description: Reverse proxy + SSL
        server: my-docker
        container: nginx-proxy-manager
    - adguard home:
        icon: si-adguard
        href: https://{{HOMEPAGE_VAR_ADGUARD_DOMAIN}}/
        description: DNS ad blocker
        server: my-docker
        container: adguardhome
        widget:
          type: adguard
          url: https://{{HOMEPAGE_VAR_ADGUARD_DOMAIN}}
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - tailscale:
        icon: si-tailscale
        href: https://{{HOMEPAGE_VAR_TAILSCALE_WEB_DOMAIN}}/
        description: Zero-config VPN
        widget:
          type: customapi
          url: http://localhost:8089
          mappings:
            - field: addresses.0
              label: Address
              format: text
            - field: lastSeen
              label: Last Seen
              format: relativeDate
            - field: expires
              label: Key Expires
              format: relativeDate
    - speedtest tracker:
        icon: mdi-speedometer
        href: https://{{HOMEPAGE_VAR_SPEEDTEST_DOMAIN}}/
        description: ISP speed monitor
        server: my-docker
        container: speedtest-tracker
        widget:
          type: speedtest
          url: https://{{HOMEPAGE_VAR_SPEEDTEST_DOMAIN}}
    - ntfy:
        icon: si-ntfy
        href: https://{{HOMEPAGE_VAR_NTFY_DOMAIN}}/
        description: Push notifications
        server: my-docker
        container: ntfy

- NAS:
    - wd 14tb r/w:
        icon: mdi-harddisk
        href: https://{{HOMEPAGE_VAR_GLANCES_DOMAIN}}/
        description: I/O — /mnt/wd14tb
        server: my-docker
        container: glances
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          # USB enclosure: kernel names (sda/sdb/sdc) can reorder across reboots.
          metric: disk:sdb
    - wd 14tb usage:
        icon: mdi-harddisk
        href: https://{{HOMEPAGE_VAR_GLANCES_DOMAIN}}/
        description: Capacity — /mnt/wd14tb
        server: my-docker
        container: glances
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: fs:/mnt/wd14tb
    - seagate 4tb r/w:
