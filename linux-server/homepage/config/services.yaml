        container: glances
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: disk:sdc
    - seagate 4tb usage:
        icon: mdi-harddisk
        href: https://{{HOMEPAGE_VAR_GLANCES_DOMAIN}}/
        description: Capacity — /mnt/seagate4tb
        server: my-docker
        container: glances
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: fs:/mnt/seagate4tb
    - wd 1tb r/w:
        icon: mdi-harddisk
        href: https://{{HOMEPAGE_VAR_GLANCES_DOMAIN}}/
