services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    network_mode: host
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "${HOSTNAME}:3000,${HOSTNAME}.local:3000,${HOSTNAME}.local,localhost:3000,192.168.1.72:3000,192.168.1.72"
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped
