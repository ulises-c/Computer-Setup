services:
  # Tailscale sidecar — joins the tailnet as `homepage`, terminating HTTPS for
  # https://homepage.<tailnet>.ts.net. See ../HTTPS.md ("host-networked apps").
  #
  # homepage stays network_mode: host (it reaches the host-networked helpers —
  # the tailscale-proxy widget on :8089 and glances on :61208 — via localhost),
  # so the sidecar runs in its own netns and proxies back to the host's :3000 via
  # host.docker.internal, exactly like the glances/cockpit variant.
  homepage-ts:
    image: tailscale/tailscale:latest
    container_name: homepage-ts
    hostname: homepage
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    network_mode: host
    depends_on:
      - homepage-ts
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      # The proxied hostname (homepage.<tailnet>.ts.net) must be allow-listed or
      # homepage rejects the request — its version of a reverse-proxy host-check.
      HOMEPAGE_ALLOWED_HOSTS: "${HOSTNAME},${HOSTNAME}.local,localhost,${SERVER_IP},${TAILSCALE_HOSTNAME},${HOMEPAGE_VAR_HOMEPAGE_DOMAIN}"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    restart: unless-stopped
