services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3003:3000/tcp"   # setup wizard (first run only) — 3000:homepage, 3001:uptime-kuma
      - "8083:80/tcp"     # web UI after setup
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
