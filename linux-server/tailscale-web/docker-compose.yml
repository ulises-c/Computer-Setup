services:
  # `tailscale web` is a HOST process (not a container), Tailscale's own
  # lightweight local node management UI. The host's tailscale-web.service
  # systemd user unit runs it with `--listen 0.0.0.0:8088 --origin
  # https://tailscale-web.<tailnet>.ts.net` — --origin so it knows it's being
  # reverse-proxied (else it redirects browsers to its own bare ip:port), and
  # --listen 0.0.0.0 (not the default localhost-only) so host.docker.internal
  # can actually reach it from this sidecar's netns. Port :5252 is NOT used —
  # an unrelated process occupies it; don't proxy there.
  # This is a sidecar-ONLY stack — there is no app container to share a netns
  # with. The sidecar joins the tailnet as `tailscale-web` and proxies
  # https://tailscale-web.<tailnet>.ts.net to the host's :8088.
  # See ../HTTPS.md ("host-networked apps" variant).
  tailscale-web-ts:
    image: tailscale/tailscale:latest
    container_name: tailscale-web-ts
    hostname: tailscale-web
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
