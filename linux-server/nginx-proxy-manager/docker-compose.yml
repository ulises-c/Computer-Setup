services:
  # Tailscale sidecar — fronts NPM's admin UI at https://npm.<tailnet>.ts.net.
  # NPM is the non-tailnet edge: it must keep binding the host's :80/:443/:81, so
  # it can't join a shared netns. This is the host-networked variant — the sidecar
  # runs in its own netns and proxies to the host's :81 (admin UI) via
  # host.docker.internal. NPM's :80/:443 proxying is unaffected. See ../HTTPS.md.
  nginx-proxy-manager-ts:
    image: tailscale/tailscale:latest
    container_name: nginx-proxy-manager-ts
    hostname: npm
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP proxy (redirects ollie-server.local → HTTPS)
      - "443:443"     # HTTPS proxy
      - "81:81"       # admin UI
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
