services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP proxy (redirects <hostname>.local → HTTPS)
      - "443:443"     # HTTPS proxy
      - "81:81"       # admin UI
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
