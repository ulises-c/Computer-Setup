services:
  # Tailscale sidecar — joins the tailnet as `qbittorrent`, terminating HTTPS for
  # the web UI at https://qbittorrent.<tailnet>.ts.net. See ../HTTPS.md.
  # The BitTorrent port stays host-published HERE (the sidecar owns the network
  # namespace, so the app container can't declare its own ports) — peer traffic
  # is raw TCP/UDP, not HTTP, and must not go through tailscale serve.
  qbittorrent-ts:
    image: tailscale/tailscale:latest
    container_name: qbittorrent-ts
    hostname: qbittorrent
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "6881:6881/tcp"   # BitTorrent
      - "6881:6881/udp"   # BitTorrent (DHT)
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    # Share the sidecar's network namespace: tailscale serve proxies :443 to the
    # web UI on 127.0.0.1:8080. After first login, set the WebUI "IP address" to
    # 127.0.0.1 (Options → Web UI) so the UI is reachable only via the serve
    # proxy, not directly on the tailnet IP — the qBittorrent analog of
    # Syncthing's STGUIADDRESS loopback bind. See ../HTTPS.md.
    network_mode: service:qbittorrent-ts
    depends_on:
      - qbittorrent-ts
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1001          # nas group — so downloads are shareable via Samba
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8080
      - UMASK=002          # group-writable (664 files / 775 dirs) for nas members
    volumes:
      - ./config:/config
      - ${QBITTORRENT_DOWNLOADS_PATH:-./downloads}:/downloads
      # Whole 14TB drive, so qBittorrent can save/recheck data anywhere on it
      # (e.g. existing downloads under /nas/media), not just the downloads dir.
      - /mnt/wd14tb:/nas
