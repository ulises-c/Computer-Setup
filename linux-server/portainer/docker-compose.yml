services:
  # Tailscale sidecar — joins the tailnet as `portainer`, terminating HTTPS for
  # https://portainer.<tailnet>.ts.net. See ../HTTPS.md for the full pattern.
  portainer-ts:
    image: tailscale/tailscale:latest
    container_name: portainer-ts
    hostname: portainer
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    # Share the sidecar's network namespace: tailscale serve proxies :443 to the
    # plaintext HTTP UI on 127.0.0.1:9000 (9443 is Portainer's own self-signed
    # TLS, not needed behind Tailscale).
    network_mode: service:portainer-ts
    depends_on:
      - portainer-ts
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
