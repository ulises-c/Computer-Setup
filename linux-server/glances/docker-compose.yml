services:
  # Tailscale sidecar — joins the tailnet as `glances`, terminating HTTPS for
  # https://glances.<tailnet>.ts.net. See ../HTTPS.md ("host-networked apps").
  #
  # Unlike the other services, glances is NOT moved into the sidecar's network
  # namespace — it must keep `network_mode: host` to read the host's real network
  # interfaces and processes. Instead the sidecar runs in its own netns and proxies
  # back to the host's glances port via host.docker.internal (the docker bridge
  # gateway), so glances' monitoring fidelity is untouched.
  glances-ts:
    image: tailscale/tailscale:latest
    container_name: glances-ts
    hostname: glances
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # Requires TS_AUTHKEY to be allowed to apply tag:container (OAuth client, or
      # a tag-scoped auth key). Drop this line if using an untagged personal key.
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ./ts-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    privileged: true
    network_mode: host
    environment:
      - GLANCES_OPT=-w
      - TZ=America/Los_Angeles
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
