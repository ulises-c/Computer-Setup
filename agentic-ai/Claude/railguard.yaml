# Railguard Policy — Computer-Setup / global
# https://github.com/railyard-dev/railguard
#
# Defaults are prepended at runtime (merge_with_defaults); only overrides here.
# Rules evaluated: allowlist → blocklist → approve → default allow.

version: 1

# ── Custom blocklist additions ────────────────────────────────────────
# escalation and bulk-staging blocks were removed — validate-bash.sh owns
# those patterns with first-line scoping to avoid heredoc false positives.

blocklist: []

approve: []
allowlist: []

# ── Path fence ────────────────────────────────────────────────────────
# Project directory (CWD) is always implicitly allowed — but "project dir"
# is the hook's cwd at each call, not a root captured at session start. A
# `cd` into a nested dir re-anchors it, so `cd` back to the repo root asks
# (#26). Dev roots below keep cwd drift inside any repo under them fenced-in
# until upstream anchors the fence to a stable session project root.
# ~/.gnupg and ~/.config/gh are intentionally absent — required for GPG
# commit signing and gh CLI; managed at the validate-write.sh hook layer.

fence:
  enabled: true
  allowed_paths:
    - "~/.claude"
    - "/tmp"
    - "~/github"
    - "~/Github"
    - "~/Bitbucket"
  denied_paths:
    - "~/.ssh"
    - "~/.aws"
    - "~/.config/gcloud"
    - "/etc"

trace:
  enabled: true
  directory: .railguard/traces

snapshot:
  enabled: true
  tools: [Write, Edit]
  directory: .railguard/snapshots
