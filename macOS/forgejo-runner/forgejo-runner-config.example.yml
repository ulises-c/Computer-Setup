# Forgejo runner config — example.
#
# The live config (~/forgejo-runner-config.yml) is the stock output of
# `forgejo-runner generate-config` PLUS the `server:` block below. The fields
# that actually matter are here.
#
# Registering (the current Forgejo flow): Site Administration → Actions →
# Runners → Create new runner hands you a ready-made `server.connections` block
# (url / uuid / token). Paste it under `server:` and add the `labels:` line —
# the UI issues the runner's credentials directly, so no `forgejo-runner
# register` step is needed. Use the *Site Administration* page (instance scope),
# not a repo/org runners page: the server-side monitor reads the admin runner
# list, so a repo/org-scoped runner shows as "down" even while it runs fine.
#
# DO NOT commit a real token. The values below are placeholders.

runner:
  file: .runner
  capacity: 1          # one job at a time on the Mac mini
  timeout: 3h
  shutdown_timeout: 3h
  fetch_interval: 2s
  labels: []           # labels live per-connection (below), not here

cache:
  enabled: true
  port: 0              # random free port for the internal cache server

# Each connection points the runner at one Forgejo instance. The url MUST
# match the host in the server's ROOT_URL.
# This is the field that broke after the server moved from
# <hostname>:3300 to its own Tailscale node https://forgejo.<tailnet>.ts.net
# (HTTPS via tailscale serve).
server:
  connections:
    home:
      url: https://forgejo.<tailnet>.ts.net
      uuid: 00000000-0000-0000-0000-000000000000   # from "Create new runner"
      token: <from-forgejo-create-new-runner>      # runner secret — never commit the real one
      labels:
        - macos-latest:host   # `:host` = run jobs directly on macOS, no Docker
